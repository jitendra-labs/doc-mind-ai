<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Document Intelligence Platform</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #171a23;
    --border: #2a2e3a;
    --text: #e8e9ec;
    --muted: #8b8f9c;
    --accent: #4f8cff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
  }
  #sidebar {
    width: 320px;
    border-right: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
    background: var(--panel);
  }
  #sidebar h2 { font-size: 15px; margin: 0 0 12px; color: var(--muted); }
  #upload-box {
    border: 1px dashed var(--border);
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 16px;
  }
  #upload-box input[type=file] { width: 100%; margin-bottom: 8px; font-size: 12px; }
  select, button {
    background: #1f2330;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    cursor: pointer;
  }
  button.primary { background: var(--accent); border-color: var(--accent); color: white; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .doc-item {
    padding: 8px 10px;
    border-radius: 6px;
    margin-bottom: 6px;
    background: #1c1f2a;
    font-size: 13px;
  }
  .doc-item .meta { color: var(--muted); font-size: 11px; margin-top: 2px; }

  #main { flex: 1; display: flex; flex-direction: column; }
  #chat-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg { max-width: 720px; }
  .msg.user { align-self: flex-end; }
  .msg .bubble {
    padding: 10px 14px;
    border-radius: 10px;
    line-height: 1.5;
    font-size: 14px;
    white-space: pre-wrap;
  }
  .msg.user .bubble { background: var(--accent); color: white; }
  .msg.assistant .bubble { background: var(--panel); border: 1px solid var(--border); }
  .sources {
    margin-top: 8px;
    font-size: 12px;
    color: var(--muted);
  }
  .source-chip {
    display: inline-block;
    background: #1f2330;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2px 8px;
    margin: 2px 4px 0 0;
  }
  #input-row {
    display: flex;
    gap: 10px;
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }
  #question {
    flex: 1;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #1c1f2a;
    color: var(--text);
    font-size: 14px;
  }
  #status { font-size: 12px; color: var(--muted); margin-top: 6px; }
</style>
</head>
<body>

<div id="sidebar">
  <h2>UPLOAD DOCUMENT</h2>
  <div id="upload-box">
    <input type="file" id="file-input" accept="application/pdf" />
    <div style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
      <label style="font-size:12px; color: var(--muted);">Chunking:</label>
      <select id="chunk-strategy">
        <option value="fixed">Fixed-size</option>
        <option value="recursive" selected>Recursive</option>
      </select>
    </div>
    <button class="primary" id="upload-btn" onclick="uploadFile()">Upload & Ingest</button>
    <div id="upload-status" style="font-size:12px; color: var(--muted); margin-top:6px;"></div>
  </div>

  <h2>DOCUMENTS</h2>
  <div id="doc-list"></div>
</div>

<div id="main">
  <div id="chat-header">Ask a question about your uploaded documents</div>
  <div id="messages"></div>
  <div style="padding: 0 20px;">
    <div id="status"></div>
  </div>
  <div id="input-row">
    <input type="text" id="question" placeholder="e.g. What was Arjun Mehta's prescription?" onkeydown="if(event.key==='Enter') askQuestion()" />
    <button class="primary" onclick="askQuestion()">Ask</button>
  </div>
</div>

<script>
const API_BASE = "http://localhost:8100";

async function loadDocuments() {
  try {
    const res = await fetch(`${API_BASE}/api/documents`);
    const docs = await res.json();
    const list = document.getElementById("doc-list");
    list.innerHTML = "";
    if (!docs || docs.length === 0) {
      list.innerHTML = '<div style="color:var(--muted); font-size:13px;">No documents yet.</div>';
      return;
    }
    docs.forEach(d => {
      const div = document.createElement("div");
      div.className = "doc-item";
      div.innerHTML = `
        <div>${d.filename}</div>
        <div class="meta">${d.page_count} pages · ${d.chunks_count || 0} chunks · ${d.chunk_strategy}</div>
      `;
      list.appendChild(div);
    });
  } catch (err) {
    console.error("Failed to load documents:", err);
  }
}

async function uploadFile() {
  const fileInput = document.getElementById("file-input");
  const strategy = document.getElementById("chunk-strategy").value;
  const statusEl = document.getElementById("upload-status");

  if (!fileInput.files.length) {
    statusEl.textContent = "Choose a PDF first.";
    return;
  }

  const formData = new FormData();
  formData.append("file", fileInput.files[0]);

  statusEl.textContent = "Uploading & ingesting (OCR -> chunk -> embed)...";
  document.getElementById("upload-btn").disabled = true;

  try {
    // Matches your clean api/ routing scheme
    const res = await fetch(`${API_BASE}/api/documents/upload?chunk_strategy=${strategy}`, {
      method: "POST",
      body: formData,
    });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    statusEl.textContent = `Done: ${data.chunks_created} chunks created.`;
    fileInput.value = "";
    loadDocuments();
  } catch (err) {
    statusEl.textContent = "Error: " + err.message;
  } finally {
    document.getElementById("upload-btn").disabled = false;
  }
}

async function askQuestion() {
  const input = document.getElementById("question");
  const statusEl = document.getElementById("status");
  const messages = document.getElementById("messages");
  const query = input.value.trim();
  if (!query) return;

  // 1. Render User Message Immediately
  const userDiv = document.createElement("div");
  userDiv.className = "msg user";
  userDiv.innerHTML = `<div class="bubble">${query}</div>`;
  messages.appendChild(userDiv);
  input.value = "";
  messages.scrollTop = messages.scrollHeight;

  statusEl.textContent = "Querying vector space and streaming model response...";

  try {
    // Optional: Keep your debug retrieval call if you want to explicitly list match metadata blocks separately
    let matchesHtml = "";
    try {
      const debugRes = await fetch(`${API_BASE}/api/chats/debug-retrieve?query=${encodeURIComponent(query)}&top_k=4`);
      if (debugRes.ok) {
        const retrievalData = await debugRes.json();
        if (retrievalData.matches && retrievalData.matches.length > 0) {
          matchesHtml = '<div class="sources">' + retrievalData.matches.map(m => {
            const roundedSim = m.similarity ? m.similarity.toFixed(4) : "0.000ed";
            return `<span class="source-chip">${m.filename} (p. ${m.page_number}, sim: ${roundedSim})</span>`;
          }).join("") + '</div>';
        }
      }
    } catch (e) {
      console.warn("Source mapping metadata skipped:", e);
    }

    // 2. Set up Assistant UI Container Node
    const assistantDiv = document.createElement("div");
    assistantDiv.className = "msg assistant";
    
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = ""; // Populated progressively by the event stream
    assistantDiv.appendChild(bubble);
    
    if (matchesHtml) {
      assistantDiv.innerHTML += matchesHtml;
      // Re-query selectors inside the modified HTML node structure
      var liveBubble = assistantDiv.querySelector('.bubble');
    }

    messages.appendChild(assistantDiv);
    messages.scrollTop = messages.scrollHeight;

    const targetBubble = liveBubble || bubble;

    // 3. Construct URL with parameters exactly as expected by your FastAPI endpoint
    const streamUrl = `${API_BASE}/api/chats/ask/stream?query=${encodeURIComponent(query)}&top_k=4`;

    // 4. Fire the streaming POST request
    const streamRes = await fetch(streamUrl, { 
      method: "POST"
    });
    
    if (!streamRes.ok) throw new Error(`Streaming session dropped with status ${streamRes.status}`);

    // 5. Decode incoming stream chunk by chunk
    const reader = streamRes.body.getReader();
    const decoder = new TextDecoder("utf-8");

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      
      const tokenChunk = decoder.decode(value, { stream: true });
      targetBubble.textContent += tokenChunk;
      messages.scrollTop = messages.scrollHeight;
    }

    statusEl.textContent = "";
  } catch (err) {
    const errorDiv = document.createElement("div");
    errorDiv.className = "msg assistant";
    errorDiv.innerHTML = `<div class="bubble" style="color: #ff6b6b;">Error: ${err.message}</div>`;
    messages.appendChild(errorDiv);
    statusEl.textContent = "";
  }
}

// Kick off initial setup load
loadDocuments();
</script>

</body>
</html>
